<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveConnect - Trang Chủ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f5f5f5; }
    header { background:#ff3366; color:#fff; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size:20px; }
    nav a { color:white; margin:0 10px; text-decoration:none; }
    .container { display:flex; flex-wrap:wrap; padding:20px; gap:20px; }
    .sidebar, .friends { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .sidebar { flex:1; min-width:250px; max-width:300px; }
    .feed { flex:2; min-width:300px; background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .post { border-bottom:1px solid #ddd; padding:10px 0; }
    .post:last-child{border:none;}
    .suggestions { background:white; padding:15px; margin-top:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .friend-card { display:inline-block; width:140px; margin:10px; text-align:center; border:1px solid #ddd; border-radius:8px; padding:10px; }
    .friend-card button { background:#ff3366; border:none; padding:5px 10px; color:#fff; border-radius:5px; margin-top:5px; cursor:pointer; }
    .chat-box { position:fixed; bottom:0; right:20px; width:300px; background:white; border:1px solid #ddd; border-radius:8px 8px 0 0; display:none; flex-direction:column; }
    .chat-header { background:#ff3366; color:white; padding:10px; cursor:pointer; }
    .chat-messages { flex:1; overflow-y:auto; padding:10px; height:200px; }
    .chat-input { display:flex; border-top:1px solid #ddd; }
    .chat-input input { flex:1; border:none; padding:10px; }
    .chat-input button { border:none; background:#ff3366; color:white; padding:10px; cursor:pointer; }
    .vip-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    .vip-content { background:white; padding:20px; border-radius:8px; width:90%; max-width:400px; }
    .close { float:right; cursor:pointer; color:red; }
  </style>
</head>
<body>
<header>
  <h1>LoveConnect</h1>
  <nav>
    <a href="trang-chu.html">Trang Chủ</a>
    <a href="#">Bạn bè</a>
    <a href="#">Tin nhắn</a>
    <a href="#">Ghép đôi</a>
    <a href="#" id="openVip">Nâng cấp VIP</a>
    <a href="#">Hỗ trợ</a>
  </nav>
  <div id="userProfile"></div>
</header>

<div class="container">
  <div class="sidebar">
    <h3>Hồ sơ</h3>
    <div id="profile"></div>
  </div>

  <div class="feed">
    <h3>Bạn đang nghĩ gì?</h3>
    <textarea id="postContent" rows="3" style="width:100%;"></textarea>
    <input type="file" id="postFile">
    <button onclick="createPost()">Đăng</button>
    <div id="posts"></div>
  </div>

  <div class="friends">
    <h3>Gợi ý kết bạn</h3>
    <div id="suggested"></div>
  </div>
</div>

<div class="chat-box" id="chatBox">
  <div class="chat-header" onclick="toggleChat()">Chat với <span id="chatUser"></span></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="Nhập tin nhắn...">
    <button onclick="sendMessage()">Gửi</button>
  </div>
</div>

<div class="vip-modal" id="vipModal">
  <div class="vip-content">
    <span class="close" onclick="document.getElementById('vipModal').style.display='none'">&times;</span>
    <h3>Nâng cấp VIP</h3>
    <p><b>VIP Week:</b> 50.000đ / Tuần</p>
    <p><b>Basic:</b> 199.000đ / Tháng</p>
    <p><b>Premium:</b> 499.000đ / Tháng</p>
    <p>Thanh toán: Vietcombank - 1059173949 - Nguyễn Thanh Duy</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=1059173949" alt="QR Thanh toán">
    <button onclick="confirmPayment()">Đã thanh toán</button>
  </div>
</div>

<script>
const API_BASE = window.location.origin + "/api";
let ws;
let currentChatUser = null;

// Kiểm tra đăng nhập
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}

// Lấy hồ sơ
async function loadProfile() {
  const res = await fetch(API_BASE+"/profile",{headers:{Authorization:"Bearer "+localStorage.getItem("token")}});
  if(res.ok){ const data=await res.json(); document.getElementById("profile").innerText=data.username+" ("+data.email+")"; document.getElementById("userProfile").innerText=data.username; }
}
loadProfile();

// Lấy bài viết
async function loadPosts(){
  const res=await fetch(API_BASE+"/posts",{headers:{Authorization:"Bearer "+localStorage.getItem("token")}});
  if(res.ok){ const posts=await res.json(); const c=document.getElementById("posts"); c.innerHTML=""; posts.forEach(p=>{c.innerHTML+=`<div class='post'><b>${p.author.username}:</b> ${p.content} ${p.fileUrl?("<br><a href='"+p.fileUrl+"' target='_blank'>File</a>"):""}</div>`}); }
}
loadPosts();

// Đăng bài
async function createPost(){
  const fd=new FormData();
  fd.append("content",document.getElementById("postContent").value);
  if(document.getElementById("postFile").files[0]) fd.append("file",document.getElementById("postFile").files[0]);
  const res=await fetch(API_BASE+"/posts",{method:"POST",headers:{Authorization:"Bearer "+localStorage.getItem("token")}},body:fd);
  if(res.ok){ alert("Đã đăng"); loadPosts(); }
}

// Gợi ý bạn bè
async function loadSuggested(){
  const res=await fetch(API_BASE+"/users/suggested",{headers:{Authorization:"Bearer "+localStorage.getItem("token")}});
  if(res.ok){ const users=await res.json(); const c=document.getElementById("suggested"); c.innerHTML=""; users.forEach(u=>{c.innerHTML+=`<div class='friend-card'><div>${u.username}</div><button onclick="openChat('${u._id}','${u.username}')">Nhắn tin</button></div>`}); }
}
loadSuggested();

// Chat
function openChat(id,username){ currentChatUser={id,username}; document.getElementById("chatUser").innerText=username; document.getElementById("chatBox").style.display="flex"; connectWS(); }
function toggleChat(){ const b=document.getElementById("chatBox"); b.style.display=b.style.display==="none"?"flex":"none"; }
function connectWS(){ ws=new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host+"?token="+localStorage.getItem("token")); ws.onmessage=(m)=>{const data=JSON.parse(m.data); if(data.type==="message"){document.getElementById("chatMessages").innerHTML+=`<div><b>${data.sender.username}:</b> ${data.content||""} ${data.fileUrl?("<a href='"+data.fileUrl+"' target='_blank'>File</a>"):""}</div>`;} }; }
function sendMessage(){ const msg={type:"message",receiverId:currentChatUser.id,content:document.getElementById("chatInput").value}; ws.send(JSON.stringify(msg)); document.getElementById("chatInput").value=""; }

// VIP modal
document.getElementById("openVip").onclick=()=>{document.getElementById("vipModal").style.display="flex";}
function confirmPayment(){ alert("Thông tin thanh toán đã gửi tới admin. Vui lòng chờ duyệt!"); document.getElementById("vipModal").style.display="none"; }
</script>
</body>
</html>
