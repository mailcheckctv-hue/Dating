<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Dating App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .logo {
            margin-bottom: 25px;
            text-align: center;
        }
        
        .logo h1 {
            color: #e91e63;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 16px;
        }
        
        .login-card {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 25px;
            width: 100%;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #2e7d32;
        }
        
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c62828;
        }

        .warning-message {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ffeaa7;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: #e91e63;
            box-shadow: 0 0 0 2px rgba(233, 30, 99, 0.2);
            outline: none;
        }
        
        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }
        
        .forgot-password a {
            color: #e91e63;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
            color: #c2185b;
        }
        
        .login-btn {
            background: linear-gradient(to right, #e91e63, #ad1457);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
            position: relative;
        }
        
        .login-btn:hover:not(:disabled) {
            background: linear-gradient(to right, #d81b60, #880e4f);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #777;
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        
        .divider::before {
            margin-right: 10px;
        }
        
        .divider::after {
            margin-left: 10px;
        }
        
        .social-login {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .social-btn:hover {
            transform: scale(1.1);
        }
        
        .fb-btn {
            background-color: #3b5998;
        }
        
        .gg-btn {
            background-color: #db4437;
        }
        
        .zl-btn {
            background-color: #0068ff;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        
        .register-link a {
            color: #e91e63;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        .register-link a:hover {
            text-decoration: underline;
            color: #c2185b;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }
        
        .test-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            .login-card {
                padding: 20px;
            }
            
            .test-btn {
                bottom: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Dating</h1>
            <p>Kết nối và làm quen với bạn bè mới</p>
        </div>
        
        <div class="success-message" id="successMessage">
            <strong>Thành công!</strong> Đăng nhập thành công với tài khoản: <span id="usernameDisplay"></span>
        </div>
        
        <div class="error-message" id="errorMessage">
            <strong>Lỗi!</strong> <span id="errorText"></span>
        </div>

        <div class="warning-message" id="warningMessage">
            <strong>Thông báo:</strong> Đang kiểm tra kết nối server...
        </div>
        
        <div class="login-card" id="loginCard">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập hoặc Email</label>
                    <input type="text" id="username" placeholder="Nhập tên đăng nhập hoặc email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                
                <div class="forgot-password">
                    <a href="#">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Đăng nhập</span>
                    <span id="btnLoading" class="loading" style="display: none;"></span>
                </button>
                
                <div class="divider">
                    Hoặc đăng nhập bằng
                </div>
                
                <div class="social-login">
                    <div class="social-buttons">
                        <div class="social-btn fb-btn">f</div>
                        <div class="social-btn gg-btn">g</div>
                        <div class="social-btn zl-btn">z</div>
                    </div>
                </div>
                
                <div class="register-link">
                    Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a>
                </div>
            </form>
        </div>
        
        <div class="footer">
            © 2024 Dating - Mãi kết nối bạn bè
        </div>
    </div>

    <button class="test-btn" id="testBtn">Test Kết Nối Server</button>

    <script>
        // URL API - Sử dụng URL chính xác của bạn
        const API_BASE_URL = 'https://dating-bixm.onrender.com';
        console.log('API Base URL:', API_BASE_URL);

        // Hiển thị thông báo
        function showMessage(elementId, text, isError = false) {
            const messageEl = document.getElementById(elementId);
            messageEl.innerHTML = isError ? `<strong>Lỗi!</strong> ${text}` : `<strong>Thành công!</strong> ${text}`;
            messageEl.style.display = 'block';
            
            if (isError) {
                // Giữ thông báo lỗi hiển thị lâu hơn
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 10000);
            } else {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 5000);
            }
        }

        // Reset button trạng thái
        function resetButton() {
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            
            loginBtn.disabled = false;
            btnText.textContent = 'Đăng nhập';
            btnLoading.style.display = 'none';
        }

        // Test kết nối server
        async function testConnection() {
            try {
                showMessage('warningMessage', '🔄 Đang kiểm tra kết nối server...', false);
                
                // Sử dụng fetch với timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(API_BASE_URL + '/api/health', {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Kết nối server thành công:', data);
                
                showMessage('warningMessage', '✅ Kết nối server thành công! Status: ' + data.status, false);
                return true;
            } catch (error) {
                console.error('Lỗi kết nối:', error);
                
                if (error.name === 'AbortError') {
                    showMessage('warningMessage', '❌ Server không phản hồi sau 10 giây. Có thể server đang tắt hoặc có vấn đề kết nối.', true);
                } else {
                    showMessage('warningMessage', '❌ Lỗi kết nối: ' + error.message, true);
                }
                return false;
            }
        }

        // ✅ Xử lý sự kiện submit form đăng nhập
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hiển thị trạng thái loading
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            
            loginBtn.disabled = true;
            btnText.textContent = 'Đang xử lý...';
            btnLoading.style.display = 'inline-block';

            // Ẩn thông báo cũ
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('errorMessage', 'Vui lòng nhập đầy đủ thông tin đăng nhập!', true);
                resetButton();
                return;
            }
            
            try {
                console.log('Đang gửi request đăng nhập đến:', API_BASE_URL + '/api/login');
                
                // Sử dụng fetch với timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const response = await fetch(API_BASE_URL + '/api/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    // Lưu token và thông tin user
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Hiển thị thông báo thành công
                    document.getElementById('usernameDisplay').textContent = data.user.username;
                    document.getElementById('successMessage').style.display = 'block';
                    
                    // Chuyển hướng sau 1.5 giây
                    setTimeout(function() {
                        window.location.href = 'trang-chu.html';
                    }, 1500);
                } else {
                    showMessage('errorMessage', 'Đăng nhập thất bại: ' + (data.message || 'Tên đăng nhập hoặc mật khẩu không đúng'), true);
                    resetButton();
                }
            } catch (error) {
                console.error('Lỗi đăng nhập:', error);
                
                if (error.name === 'AbortError') {
                    showMessage('errorMessage', 'Server không phản hồi sau 15 giây. Vui lòng thử lại sau.', true);
                } else {
                    showMessage('errorMessage', 'Có lỗi xảy ra khi kết nối đến server: ' + error.message, true);
                }
                resetButton();
            }
        });

        // Nút test kết nối
        document.getElementById('testBtn').addEventListener('click', testConnection);

        // Tự động test kết nối khi trang load
        window.addEventListener('load', async () => {
            // Kiểm tra nếu đã đăng nhập
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                window.location.href = 'trang-chu.html';
                return;
            }
            
            // Hiển thị thông báo đang kiểm tra
            showMessage('warningMessage', '🔄 Đang kiểm tra kết nối server...', false);
            
            // Test kết nối
            setTimeout(testConnection, 1000);
        });
    </script>
</body>
</html>
