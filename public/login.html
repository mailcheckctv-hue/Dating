<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:#f6f7fb;margin:0}.wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}.card{background:#fff;width:420px;box-shadow:0 10px 30px rgba(0,0,0,.08);border-radius:14px;padding:28px}h1{margin:0 0 12px;font-size:26px}.input{width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:10px;font-size:15px;margin:8px 0 14px}.btn{width:100%;padding:12px 14px;border:none;background:#ff4f73;color:#fff;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}.row{display:flex;gap:10px;justify-content:space-between;margin-top:10px}a{color:#2563eb;text-decoration:none}.badge{background:#fee2e2;color:#b91c1c;padding:6px 10px;border-radius:8px;font-size:13px;display:none;margin-bottom:10px}</style></head>
<body><div class="wrap"><div class="card"><h1>Đăng nhập</h1><div id="err" class="badge"></div>
<input id="email" class="input" placeholder="Email"><input id="password" type="password" class="input" placeholder="Mật khẩu">
<button class="btn" onclick="login()">Đăng nhập</button>
<div class="row"><a href="dang-ky.html">Đăng ký</a><a href="#" onclick="alert('Liên hệ hỗ trợ để đặt lại mật khẩu');return false;">Quên mật khẩu?</a></div></div></div>
<script>const API_BASE=window.location.origin;async function login(){const e=document.getElementById('email').value.trim(),p=document.getElementById('password').value.trim(),err=document.getElementById('err');err.style.display='none';try{const r=await fetch(API_BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Lỗi máy chủ');localStorage.setItem('token',d.token);localStorage.setItem('me',JSON.stringify(d.user));location.href='trang-chu.html'}catch(ex){err.textContent=ex.message;err.style.display='block';}}</script>
</body></html>
