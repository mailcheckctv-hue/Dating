<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ - Dating App</title>
</head>
<body>
  <h2>Xin chào <span id="username"></span></h2>
  <button onclick="logout()">Đăng xuất</button>

  <h3>Chat demo</h3>
  <input id="receiverId" placeholder="ID người nhận">
  <input id="msgInput" placeholder="Tin nhắn...">
  <button onclick="sendMsg()">Gửi</button>

  <ul id="chatBox"></ul>

  <script>
    const API_BASE_URL = window.location.origin;
    const WS_URL = API_BASE_URL.replace(/^http/, "ws");
    const user = JSON.parse(localStorage.getItem("user"));
    const token = localStorage.getItem("token");
    document.getElementById("username").textContent = user.username;

    let socket;
    function connectWS() {
      socket = new WebSocket(WS_URL);

      socket.onopen = () => {
        console.log("WS connected");
        socket.send(JSON.stringify({ type: "auth", userId: user._id || user.id }));
      };

      socket.onmessage = e => {
        const data = JSON.parse(e.data);
        if (data.type === "message") {
          const li = document.createElement("li");
          li.textContent = "Tin nhắn mới: " + data.message.content;
          document.getElementById("chatBox").appendChild(li);
        }
      };

      socket.onclose = () => {
        console.log("WS disconnected, reconnecting...");
        setTimeout(connectWS, 3000);
      };
    }
    connectWS();

    function sendMsg() {
      const receiverId = document.getElementById("receiverId").value;
      const content = document.getElementById("msgInput").value;
      socket.send(JSON.stringify({
        type: "message",
        senderId: user._id || user.id,
        receiverId,
        content
      }));
      document.getElementById("msgInput").value = "";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
