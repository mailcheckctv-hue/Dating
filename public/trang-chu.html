<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>LoveConnect - Trang chủ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>:root{--pink:#ff4f73;--bg:#f6f7fb;--card:#fff;--muted:#6b7280}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg)}.top{position:sticky;top:0;z-index:10;background:var(--pink);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:16px}.brand{font-weight:800}.menu{display:flex;gap:18px;align-items:center}.menu a{color:#fff;text-decoration:none;font-weight:600;opacity:.9}.container{max-width:1100px;margin:18px auto;display:grid;grid-template-columns:280px 1fr 300px;gap:16px;padding:0 12px}.card{background:var(--card);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.06);padding:16px}.avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;background:#e5e7eb;display:inline-block}.post-input textarea{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px;min-height:60px;resize:vertical}.btn{background:var(--pink);color:#fff;border:none;padding:8px 14px;border-radius:10px;font-weight:700;cursor:pointer}.btn-outline{background:#fff;border:1px solid #e5e7eb}.muted{color:var(--muted)}.post{display:flex;gap:12px;margin-bottom:14px;border-bottom:1px solid #f1f5f9;padding-bottom:12px}.post img.feed{max-width:100%;border-radius:10px;margin-top:8px}.badge{background:#ef4444;color:#fff;font-weight:700;border-radius:999px;padding:2px 8px;font-size:12px;margin-left:6px}.suggestion{display:grid;grid-template-columns:repeat(1,1fr);gap:12px}.chip{display:flex;align-items:center;gap:10px;border:1px solid #e5e7eb;border-radius:12px;padding:10px}.row{display:flex;gap:10px;align-items:center}.sp{flex:1}@media (max-width:960px){.container{grid-template-columns:1fr;}.right{order:-1}}</style></head>
<body>
<div class="top"><div class="brand">❤️ LoveConnect</div><div class="menu"><a href="trang-chu.html">Trang chủ</a><a id="msgTab" href="#" onclick="openMessages();return false;">Tin nhắn <span id="badge" class="badge" style="display:none">0</span></a><a href="#" onclick="openSupport();return false;">Hỗ trợ</a></div><div class="sp"></div><div class="row"><img id="navAvatar" class="avatar" style="width:36px;height:36px"><button class="btn-outline btn" onclick="logout()">Đăng xuất</button></div></div>
<div class="container">
  <div class="left card"><div class="row" style="gap:12px"><img id="myAvatar" class="avatar"><div><div id="myName" style="font-weight:700"></div><div id="myEmail" class="muted" style="font-size:13px"></div></div></div>
  <hr style="border:none;height:1px;background:#f1f5f9;margin:12px 0"><div><div class="muted" style="margin-bottom:6px">Cập nhật ảnh đại diện</div><div class="row"><input type="file" id="avatarFile" accept="image/*"><button class="btn" onclick="uploadAvatar()">Tải lên</button></div></div></div>
  <div class="center"><div class="card post-input"><textarea id="content" placeholder="Bạn đang nghĩ gì?"></textarea><div class="row" style="margin-top:8px;justify-content:space-between"><input type="file" id="image" accept="image/*"><button class="btn" onclick="createPost()">Đăng</button></div></div><div id="feed" class="card"></div></div>
  <div class="right card"><div style="font-weight:700;margin-bottom:10px">Gợi ý kết bạn</div><div id="suggest" class="suggestion"></div></div>
</div>
<div id="msgModal" style="position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center"><div class="card" style="width:760px;max-width:95vw;max-height:85vh;overflow:auto"><div class="row" style="justify-content:space-between;align-items:center"><div style="font-weight:700">Tin nhắn</div><button class="btn-outline btn" onclick="closeMessages()">Đóng</button></div><div class="row" style="margin-top:10px"><select id="chatWith" class="sp"></select><input type="file" id="msgFile"></div><div id="thread" style="border:1px solid #e5e7eb;border-radius:10px;padding:10px;margin:10px 0;min-height:200px;background:#fff"></div><div class="row"><input id="msgText" class="sp" placeholder="Nhập tin nhắn..." style="padding:10px;border:1px solid #e5e7eb;border-radius:10px"><button class="btn" onclick="sendMessage()">Gửi</button></div></div></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const API_BASE=window.location.origin;let token=localStorage.getItem('token');let me=JSON.parse(localStorage.getItem('me')||'{}');if(!token){location.href='login.html';}
const ioClient=io();ioClient.emit('auth',token);
function setMeUI(){document.getElementById('myName').textContent=me.name||me.email;document.getElementById('myEmail').textContent=me.email||'';document.getElementById('myAvatar').src=me.avatar||'https://i.pravatar.cc/100?u='+(me.email||'me');document.getElementById('navAvatar').src=me.avatar||'https://i.pravatar.cc/100?u='+(me.email||'me');}
setMeUI();function logout(){localStorage.clear();location.href='login.html';}function fmt(d){const dt=new Date(d);return dt.toLocaleString();}
async function api(p,o={}){const r=await fetch(API_BASE+p,{headers:{'Authorization':'Bearer '+token},...o});if(!r.ok){const t=await r.json().catch(()=>({error:'Lỗi máy chủ'}));throw new Error(t.error||'Lỗi');}return r.json();}
async function loadUnread(){try{const {count}=await api('/api/messages/unread-count');const b=document.getElementById('badge');if(count>0){b.textContent=count;b.style.display='inline-block';}else b.style.display='none';}catch(e){}}
loadUnread();setInterval(loadUnread,8000);
async function loadSuggested(){const list=await api('/api/users/suggested');const w=document.getElementById('suggest');w.innerHTML='';list.forEach(u=>{const d=document.createElement('div');d.className='chip';d.innerHTML=`<img class="avatar" style="width:46px;height:46px" src="${u.avatar||'https://i.pravatar.cc/100?u='+u._id}"/><div class="sp"><div style="font-weight:700">${u.name||u.email||'Người dùng'}</div><div class="muted" style="font-size:12px">${u.location||''}</div></div><button class="btn-outline btn" onclick="sendFriend('${u._id}')">Kết bạn</button><button class="btn" onclick="openMessages('${u._id}')">Nhắn</button>`;w.appendChild(d);});}
loadSuggested();
async function loadFeed(){const posts=await api('/api/posts');const feed=document.getElementById('feed');feed.innerHTML='';posts.forEach(p=>{const d=document.createElement('div');d.className='post';d.innerHTML=`<img class="avatar" src="${p.userId?.avatar||'https://i.pravatar.cc/100?u='+p.userId?.email}" /><div class="sp"><div style="font-weight:700">${p.userId?.name||p.userId?.email}</div><div class="muted" style="font-size:12px">${fmt(p.createdAt)}</div><div style="margin-top:6px">${(p.content||'').replace(/</g,'&lt;')}</div>${p.image?`<img class="feed" src="${p.image}">`:''}</div>`;feed.appendChild(d);});}
loadFeed();
async function createPost(){const fd=new FormData();fd.append('content',document.getElementById('content').value);const file=document.getElementById('image').files[0];if(file)fd.append('image',file);await api('/api/posts',{method:'POST',body:fd});document.getElementById('content').value='';document.getElementById('image').value='';loadFeed();}
async function uploadAvatar(){const f=document.getElementById('avatarFile').files[0];if(!f)return alert('Chọn ảnh trước');const fd=new FormData();fd.append('avatar',f);const r=await api('/api/users/avatar',{method:'POST',body:fd});me.avatar=r.avatar;localStorage.setItem('me',JSON.stringify(me));setMeUI();}
async function sendFriend(id){try{await api('/api/friends/request',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({to:id})});alert('Đã gửi lời mời kết bạn!');}catch(e){alert(e.message);}}
async function openMessages(targetId){document.getElementById('msgModal').style.display='flex';await loadFriendsIntoSelect(targetId);await loadThread();}
function closeMessages(){document.getElementById('msgModal').style.display='none';}
async function loadFriendsIntoSelect(targetId){const list=await api('/api/friends/list');const sel=document.getElementById('chatWith');sel.innerHTML='';list.forEach(u=>{const o=document.createElement('option');o.value=u._id;o.textContent=u.name||u.email;sel.appendChild(o);});if(targetId)sel.value=targetId;sel.onchange=loadThread;}
async function loadThread(){const uid=document.getElementById('chatWith').value;if(!uid){document.getElementById('thread').innerHTML='<div class="muted">Hãy kết bạn để bắt đầu trò chuyện.</div>';return;}const msgs=await api('/api/messages/thread?userId='+uid);const wrap=document.getElementById('thread');wrap.innerHTML='';msgs.forEach(m=>{const d=document.createElement('div');d.style.margin='6px 0';const self=m.from===me.id||m.from===(me._id||'');let body=(m.text||'');if(m.fileUrl){body+=`<br><a href="${m.fileUrl}" target="_blank">Tệp đính kèm</a>`;}d.innerHTML=`<div style="display:inline-block;max-width:80%;padding:8px 10px;border-radius:10px;background:${self?'#dbeafe':'#f1f5f9'}">${body}</div>`;d.style.textAlign=self?'right':'left';wrap.appendChild(d);});wrap.scrollTop=wrap.scrollHeight;}
async function sendMessage(){const uid=document.getElementById('chatWith').value;if(!uid)return;const fd=new FormData();fd.append('to',uid);const text=document.getElementById('msgText').value;if(text)fd.append('text',text);const f=document.getElementById('msgFile').files[0];if(f){fd.append('file',f);fd.append('type','file');}await api('/api/messages/send',{method:'POST',body:fd});document.getElementById('msgText').value='';document.getElementById('msgFile').value='';loadThread();loadUnread();}
ioClient.on('message:new',()=>{loadUnread();});function openSupport(){alert('Hỗ trợ: liên hệ admin.');}
</script></body></html>
