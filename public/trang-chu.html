
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveConnect - Trang chủ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--pink:#e91e63;--danger:#ef4444;--bg:#fafafa;--card:#fff;--muted:#6b7280;--text:#111827}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text)}
header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--pink);color:#fff;position:sticky;top:0;z-index:10}
.logo{font-weight:700}
.btn{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;font-weight:600}
.btn-logout{background:var(--danger);color:#fff}
.container{display:grid;grid-template-columns:280px 1fr 340px;gap:16px;padding:16px}
.card{background:var(--card);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.06);padding:14px}
.section-title{margin:0 0 10px;font-size:16px}
.row{display:flex;gap:8px;align-items:center}
input,textarea{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover}
.post img{max-width:100%;border-radius:12px;margin-top:8px}
.badge{background:#fee2e2;color:#991b1b;border-radius:999px;padding:2px 8px;font-size:12px;margin-left:6px}
.list{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow:auto}
.user-item{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid #f1f5f9;border-radius:12px}
.user-item button{padding:6px 10px;border:none;border-radius:8px;background:var(--pink);color:#fff;cursor:pointer}
.chat{display:flex;flex-direction:column;height:70vh}
.chat-messages{flex:1;border:1px solid #e5e7eb;border-radius:12px;padding:10px;overflow:auto;background:#fff}
.chat-input{display:flex;gap:8px;margin-top:8px}
.message{margin:6px 0}
.message.me{text-align:right}
.message .bubble{display:inline-block;padding:8px 10px;border-radius:12px;background:#f3f4f6;max-width:70%}
.message.me .bubble{background:#ffe4ec}
.nav{display:flex;gap:8px}
.nav a{color:#fff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<header>
  <div class="logo">LoveConnect</div>
  <nav class="nav">
    <span>Trang chủ</span>
    <span id="badgeMessage" class="badge" style="display:none">0</span>
  </nav>
  <button class="btn btn-logout" onclick="logout()">Đăng xuất</button>
</header>

<div class="container">
  <aside class="card">
    <h3 class="section-title">Hồ sơ</h3>
    <div class="row">
      <img id="meAvatar" class="avatar" src="" alt="avatar">
      <div>
        <div id="meName" style="font-weight:600"></div>
        <small id="meEmail" class="muted"></small>
      </div>
    </div>
    <hr>
    <div>
      <label>Đổi ảnh đại diện</label>
      <input type="file" id="avatarInput" accept="image/*">
      <button class="btn" onclick="uploadAvatar()">Cập nhật</button>
    </div>
    <hr>
    <h3 class="section-title">Bạn bè</h3>
    <div id="friendList" class="list"></div>
  </aside>

  <main class="card">
    <h3 class="section-title">Bài viết</h3>
    <div class="row">
      <textarea id="postContent" placeholder="Bạn đang nghĩ gì?" rows="2"></textarea>
    </div>
    <div class="row">
      <input type="file" id="postImage" accept="image/*">
      <button class="btn" onclick="createPost()">Đăng</button>
    </div>
    <div id="feed" class="list" style="margin-top:12px"></div>
  </main>

  <aside class="card">
    <h3 class="section-title">Gợi ý kết bạn</h3>
    <div id="suggestList" class="list"></div>
    <hr>
    <h3 class="section-title">Tin nhắn</h3>
    <div class="chat">
      <select id="chatTarget"></select>
      <div id="chatBox" class="chat-messages"></div>
      <div class="chat-input">
        <input id="chatText" placeholder="Nhập tin nhắn...">
        <input id="chatFile" type="file">
        <button class="btn" onclick="sendMessage()">Gửi</button>
      </div>
    </div>
  </aside>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user")||"null");
if(!token || !user){ location.href="login.html"; }

// Profile
document.getElementById("meName").innerText = user.username || "";
document.getElementById("meEmail").innerText = user.email || "";
document.getElementById("meAvatar").src = user.avatarUrl || "https://i.pravatar.cc/100";

// Socket
const socket = io(API_BASE, { transports: ["websocket","polling"] });
socket.on("connect", ()=> socket.emit("join", user.id));
socket.on("newMessage", (msg)=>{
  if (msg.sender === getSelectedTarget()) {
    appendMessage(msg);
  }
  refreshUnread();
});

// Posts
async function createPost(){
  const fd = new FormData();
  fd.append("content", document.getElementById("postContent").value);
  const file = document.getElementById("postImage").files[0];
  if (file) fd.append("image", file);
  const res = await fetch(API_BASE+"/api/posts", { method:"POST", headers:{ Authorization:"Bearer "+token }, body: fd });
  if(res.ok){ document.getElementById("postContent").value=""; document.getElementById("postImage").value=""; loadPosts(); }
}
async function loadPosts(){
  const res = await fetch(API_BASE+"/api/posts", { headers:{ Authorization:"Bearer "+token }});
  const posts = await res.json();
  const feed = document.getElementById("feed"); feed.innerHTML="";
  posts.forEach(p=>{
    const item = document.createElement("div"); item.className="user-item post";
    item.innerHTML = `<img class="avatar" src="${p.user?.avatarUrl||'https://i.pravatar.cc/100'}">
      <div><b>${p.user?.username||'User'}</b><div>${p.content||''}</div>${p.imageUrl?`<img src="${p.imageUrl}">`:''}
      <div style="font-size:12px;color:#6b7280">${new Date(p.createdAt).toLocaleString()}</div></div>`;
    feed.appendChild(item);
  });
}

// Avatar
async function uploadAvatar(){
  const file = document.getElementById("avatarInput").files[0];
  if(!file) return alert("Chọn ảnh trước");
  const fd = new FormData(); fd.append("avatar", file);
  const res = await fetch(API_BASE+"/api/avatar", { method:"POST", headers:{ Authorization:"Bearer "+token }, body: fd });
  const data = await res.json();
  if(res.ok){ document.getElementById("meAvatar").src = data.avatarUrl; user.avatarUrl = data.avatarUrl; localStorage.setItem("user", JSON.stringify(user)); }
}

// Friends & Suggestion
async function loadFriends(){
  const res = await fetch(API_BASE+"/api/friends", { headers:{ Authorization:"Bearer "+token }});
  const friends = await res.json();
  const list = document.getElementById("friendList"); list.innerHTML="";
  const sel = document.getElementById("chatTarget"); sel.innerHTML="";
  friends.forEach(f=>{
    const el = document.createElement("div"); el.className="user-item";
    el.innerHTML = `<img class="avatar" src="${f.avatarUrl}"><div>${f.username}</div>`;
    el.onclick = ()=> { sel.value = f._id; openChatWith(f._id); };
    list.appendChild(el);
    const opt=document.createElement("option"); opt.value=f._id; opt.textContent=f.username; sel.appendChild(opt);
  });
}
function getSelectedTarget(){ return document.getElementById("chatTarget").value; }
async function loadSuggested(){
  const res = await fetch(API_BASE+"/api/users/suggested", { headers:{ Authorization:"Bearer "+token }});
  const data = await res.json();
  const list=document.getElementById("suggestList"); list.innerHTML="";
  data.forEach(u=>{
    const el = document.createElement("div"); el.className="user-item";
    el.innerHTML = `<img class="avatar" src="${u.avatarUrl}"><div style="flex:1">${u.username}</div>
      <button onclick="addFriend('${u._id}')">Kết bạn</button>`;
    list.appendChild(el);
  });
}
async function addFriend(id){
  const res = await fetch(API_BASE+"/api/friends/request/"+id, { method:"POST", headers:{ Authorization:"Bearer "+token }});
  if(res.ok){ alert("Đã gửi lời mời!"); }
}

// Chat
async function openChatWith(id){
  const box = document.getElementById("chatBox");
  box.innerHTML = "";
  await fetch(API_BASE+"/api/messages/mark-read/"+id, { method:"POST", headers:{ Authorization:"Bearer "+token }});
  refreshUnread();
  const res = await fetch(API_BASE+"/api/messages/with/"+id, { headers:{ Authorization:"Bearer "+token }});
  const msgs = await res.json();
  msgs.forEach(appendMessage);
}
function appendMessage(m){
  const box = document.getElementById("chatBox");
  const wrap = document.createElement("div"); wrap.className="message" + (m.sender===user.id?" me":"");
  let inner = "";
  if (m.type==="file" && m.fileUrl){
    const isImg = /\.(png|jpg|jpeg|gif|webp)$/i.test(m.fileUrl);
    inner = isImg ? `<img src="${m.fileUrl}" style="max-width:60%;border-radius:10px">` : `<a href="${m.fileUrl}" download>📎 Tải tệp</a>`;
  } else {
    inner = m.content || "";
  }
  wrap.innerHTML = `<div class="bubble">${inner}</div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}
async function sendMessage(){
  const receiver = getSelectedTarget();
  if(!receiver) return alert("Chọn bạn bè để chat");
  const input = document.getElementById("chatText");
  const file = document.getElementById("chatFile").files[0];
  const fd = new FormData();
  fd.append("receiver", receiver);
  if (file){ fd.append("file", file); }
  else { fd.append("content", input.value); }
  const res = await fetch(API_BASE+"/api/messages", { method:"POST", headers:{ Authorization:"Bearer "+token }, body: fd });
  const m = await res.json();
  if(res.ok){ appendMessage({ ...m, sender: user.id }); input.value=""; document.getElementById("chatFile").value=""; }
}
async function refreshUnread(){
  const res = await fetch(API_BASE+"/api/messages/unread-count", { headers:{ Authorization:"Bearer "+token }});
  const arr = await res.json();
  const total = arr.reduce((s,x)=>s+x.total,0);
  const badge = document.getElementById("badgeMessage");
  badge.style.display = total>0 ? "inline-block" : "none";
  badge.textContent = total;
}

// Init
loadPosts();
loadFriends();
loadSuggested();
refreshUnread();

function logout(){ localStorage.clear(); location.href="login.html"; }
</script>
</body>
</html>
