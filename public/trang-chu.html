<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveConnect - Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f6f6f6; }
    header { background: #e91e63; color: #fff; padding: 10px; text-align: center; }
    main { display: flex; height: calc(100vh - 50px); }
    nav { width: 220px; background: #fff; border-right: 1px solid #ddd; padding: 10px; overflow-y: auto; }
    section { flex: 1; display: flex; flex-direction: column; }
    #chatContainer { flex: 1; display: flex; border-top: 1px solid #ddd; }
    #chatList { width: 300px; background: #fff; border-right: 1px solid #ddd; overflow-y: auto; }
    #chatWindow { flex: 1; display: flex; flex-direction: column; position: relative; }
    #messages { flex: 1; padding: 10px; overflow-y: auto; background: #fafafa; }
    .message { display: flex; margin: 10px 0; align-items: flex-end; }
    .message.me { flex-direction: row-reverse; }
    .avatar { width: 35px; height: 35px; border-radius: 50%; background: #ccc; margin: 0 8px; object-fit: cover; }
    .bubble { max-width: 60%; padding: 8px 12px; border-radius: 12px; background: #fff; position: relative; word-wrap: break-word; }
    .me .bubble { background: #e91e63; color: #fff; }
    .time { font-size: 0.75em; color: #888; margin-top: 3px; text-align: right; }
    .bubble img { max-width: 200px; border-radius: 10px; margin-top: 5px; cursor: pointer; }
    #chatInput { display: flex; border-top: 1px solid #ddd; align-items: center; padding: 5px; gap: 5px; }
    #chatInput input[type=text] { flex: 1; padding: 10px; border: none; border-radius: 20px; }
    #chatInput button { padding: 8px 12px; border: none; background: #e91e63; color: #fff; border-radius: 50%; cursor: pointer; }
    #chatInput button:hover { background: #c2185b; }
    #emojiPicker { display: none; position: absolute; bottom: 60px; right: 10px; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 10px; max-width: 200px; flex-wrap: wrap; gap: 5px; }
    #emojiPicker span { cursor: pointer; font-size: 20px; }
    .drag-overlay { position: absolute; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;display:none; }
  </style>
</head>
<body>
  <header><h2>LoveConnect - Chat</h2></header>
  <main>
    <nav>
      <h3>Menu</h3>
      <ul>
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Hồ sơ</a></li>
        <li><a href="#" onclick="logout()">Đăng xuất</a></li>
      </ul>
      <h4>Bạn bè</h4>
      <input id="searchFriend" type="text" placeholder="Tìm kiếm bạn bè..." />
      <ul id="friendsList"></ul>
      <h4>Gợi ý kết bạn</h4>
      <ul id="suggestedList"></ul>
    </nav>
    <section>
      <div id="chatContainer">
        <div id="chatList">
          <h4 style="padding:10px;border-bottom:1px solid #ddd;">Cuộc trò chuyện gần đây</h4>
          <ul id="conversationList"></ul>
        </div>
        <div id="chatWindow">
          <div id="messages"></div>
          <div id="typing">Đang nhập...</div>
          <div id="chatInput">
            <button id="emojiBtn"><i class="fa fa-smile"></i></button>
            <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." />
            <input type="file" id="imgInput" accept="image/*" hidden />
            <button id="imgBtn"><i class="fa fa-image"></i></button>
            <input type="file" id="fileInput" accept='.pdf,.doc,.docx,.zip' hidden />
            <button id="fileBtn"><i class="fa fa-paperclip"></i></button>
            <button id="sendBtn"><i class="fa fa-paper-plane"></i></button>
          </div>
          <div id="emojiPicker"></div>
          <div class="drag-overlay" id="dragOverlay">Thả ảnh hoặc file để gửi</div>
        </div>
      </div>
    </section>
  </main>
<script>
const API_BASE_URL = window.location.origin;
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';
const me = JSON.parse(localStorage.getItem('user')||'{}');

let ws, currentChatUserId=null;
function connectWS(){
  const proto = window.location.protocol==='https:'?'wss':'ws';
  const wsUrl = `${proto}://${window.location.host}/ws?token=${encodeURIComponent(token)}`;
  ws=new WebSocket(wsUrl);
  ws.onopen=()=>console.log('WS connected');
  ws.onclose=()=>setTimeout(connectWS,3000);
  ws.onmessage=(e)=>{
    const data=JSON.parse(e.data);
    if(data.type==='message'){ renderMessage(data.message); }
  };
}
connectWS();

function renderMessage(msg){
  if(currentChatUserId && (msg.sender===currentChatUserId||msg.receiver===currentChatUserId)){
    const msgWrap=document.createElement('div');
    msgWrap.className='message '+(msg.sender===me.id?'me':'');
    const avatar=document.createElement('img');avatar.className='avatar';avatar.src=msg.senderAvatar||'https://via.placeholder.com/35';
    const bubble=document.createElement('div');bubble.className='bubble';
    if(msg.image){const img=document.createElement('img');img.src=msg.image;bubble.appendChild(img);}
    if(msg.fileUrl){const link=document.createElement('a');link.href=msg.fileUrl;link.textContent='📎 '+msg.fileName;link.target='_blank';bubble.appendChild(link);}
    if(msg.content){const span=document.createElement('span');span.textContent=msg.content;bubble.appendChild(span);}
    const time=document.createElement('div');time.className='time';time.textContent=new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});bubble.appendChild(time);
    msgWrap.appendChild(avatar);msgWrap.appendChild(bubble);document.getElementById('messages').appendChild(msgWrap);
    document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
  }
}
function sendWSMessage(receiverId,content,image,fileUrl,fileName){
  if(ws && ws.readyState===WebSocket.OPEN){ws.send(JSON.stringify({type:'message',receiverId,content,image,fileUrl,fileName}));}
}
document.getElementById('sendBtn').onclick=()=>{
  const input=document.getElementById('msgInput');const text=input.value.trim();
  if(text && currentChatUserId){sendWSMessage(currentChatUserId,text);input.value='';}
};
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('sendBtn').click();}});

// Emoji
const emojis=['😀','😁','😂','😍','😎','😭','😡','👍','👎','🙏','🔥','❤️'];
const emojiPicker=document.getElementById('emojiPicker');
emojis.forEach(em=>{const span=document.createElement('span');span.textContent=em;span.onclick=()=>{document.getElementById('msgInput').value+=em;emojiPicker.style.display='none';};emojiPicker.appendChild(span);});
document.getElementById('emojiBtn').onclick=()=>{emojiPicker.style.display=emojiPicker.style.display==='none'?'flex':'none';};

// Gửi ảnh
document.getElementById('imgBtn').onclick=()=>document.getElementById('imgInput').click();
document.getElementById('imgInput').onchange=(e)=>{
  const file=e.target.files[0];
  if(file && currentChatUserId){const reader=new FileReader();reader.onload=()=>sendWSMessage(currentChatUserId,null,reader.result);reader.readAsDataURL(file);} };
// Gửi file
document.getElementById('fileBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=(e)=>{
  const file=e.target.files[0];
  if(file && currentChatUserId){const reader=new FileReader();reader.onload=()=>sendWSMessage(currentChatUserId,null,null,reader.result,file.name);reader.readAsDataURL(file);} };
</script>
</body>
</html>
