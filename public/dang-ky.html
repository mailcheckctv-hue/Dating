<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Đăng ký</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:#f6f7fb;margin:0}.wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}.card{background:#fff;width:420px;box-shadow:0 10px 30px rgba(0,0,0,.08);border-radius:14px;padding:28px}h1{margin:0 0 12px;font-size:26px}.input,select{width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:10px;font-size:15px;margin:8px 0 14px}.btn{width:100%;padding:12px 14px;border:none;background:#ff4f73;color:#fff;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}.badge{background:#fee2e2;color:#b91c1c;padding:6px 10px;border-radius:8px;font-size:13px;display:none;margin-bottom:10px}</style></head>
<body><div class="wrap"><div class="card"><h1>Đăng ký</h1><div id="err" class="badge"></div>
<input id="name" class="input" placeholder="Họ tên / biệt danh"><input id="email" class="input" placeholder="Email">
<input id="password" type="password" class="input" placeholder="Mật khẩu"><select id="gender" class="input"><option>Nam</option><option>Nữ</option><option>Khác</option></select>
<button class="btn" onclick="register()">Đăng ký</button><div style='margin-top:10px'><a href="login.html">Đăng nhập</a></div></div></div>
<script>const API_BASE=window.location.origin;async function register(){const n=document.getElementById('name').value.trim(),e=document.getElementById('email').value.trim(),p=document.getElementById('password').value.trim(),g=document.getElementById('gender').value,err=document.getElementById('err');err.style.display='none';try{const r=await fetch(API_BASE+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,email:e,password:p,gender:g})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Lỗi máy chủ');localStorage.setItem('token',d.token);localStorage.setItem('me',JSON.stringify(d.user));location.href='trang-chu.html'}catch(ex){err.textContent=ex.message;err.style.display='block';}}</script>
</body></html>
