
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveConnect - Đăng ký</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--pink:#e91e63;--bg:#f7f7fb;--card:#ffffff;--text:#111827}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text);display:flex;min-height:100vh;align-items:center;justify-content:center}
.card{background:var(--card);padding:28px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.08);width:100%;max-width:420px}
h1{margin:0 0 18px;font-size:22px}
input{width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:12px;margin:8px 0 14px;font-size:14px}
button.primary{width:100%;padding:12px 14px;border:none;border-radius:12px;background:var(--pink);color:#fff;font-weight:600;cursor:pointer}
a{color:var(--pink);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h1>Tạo tài khoản</h1>
  <input id="username" placeholder="Tên hiển thị">
  <input id="email" placeholder="Email" autocomplete="email">
  <input id="password" type="password" placeholder="Mật khẩu" autocomplete="new-password">
  <button class="primary" onclick="register()">Đăng ký</button>
  <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
</div>
<script>
const API_BASE = window.location.origin;
async function register(){
  try{
    const res = await fetch(API_BASE + "/api/register", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ username: username.value.trim(), email: email.value.trim(), password: password.value })
    });
    const data = await res.json();
    if(!res.ok){ alert(data.error || "Đăng ký thất bại"); return; }
    alert("Đăng ký thành công! Đăng nhập ngay.");
    location.href = "login.html";
  }catch(e){ alert("Không thể kết nối server"); }
}
</script>
</body>
</html>
