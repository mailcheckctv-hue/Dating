<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Dating App</title>
</head>
<body>
  <h2>Đăng ký tài khoản</h2>
  <form id="registerForm">
    <input id="username" placeholder="Tên đăng nhập" required><br>
    <input id="email" type="email" placeholder="Email" required><br>
    <input id="password" type="password" placeholder="Mật khẩu" required><br>
    <input id="confirmPassword" type="password" placeholder="Xác nhận mật khẩu" required><br>
    <button type="submit">Đăng ký</button>
  </form>

  <p id="msg"></p>
  <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>

  <script>
    const API_BASE_URL = window.location.origin;

    document.getElementById("registerForm").addEventListener("submit", async e => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        document.getElementById("msg").textContent = "❌ Mật khẩu xác nhận không khớp!";
        return;
      }

      try {
        const res = await fetch(API_BASE_URL + "/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();
        if (res.ok) {
          // Lưu token + user và chuyển hướng
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "trang-chu.html";
        } else {
          document.getElementById("msg").textContent = "❌ " + data.message;
        }
      } catch (err) {
        document.getElementById("msg").textContent = "❌ Lỗi server!";
      }
    });
  </script>
</body>
</html>
