<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveConnect - Đăng ký</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--pink:#ff3b6b}
    body{min-height:100vh; background:linear-gradient(135deg,#ffe4ec,#f3f5ff)}
    .card{border:0; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.08)}
    .brand{font-weight:800; color:var(--pink)}
    .btn-pink{background:var(--pink); color:#fff; border-radius:12px}
    .btn-pink:hover{background:#ff2e60; color:#fff}
  </style>
</head>
<body class="d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="text-center mb-3 brand"><i class="fa-solid fa-heart"></i> LoveConnect</div>
        <div class="card p-4 p-md-5">
          <h4 class="mb-3 text-center">Tạo tài khoản</h4>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Tên hiển thị</label>
              <input type="text" class="form-control" id="username" placeholder="VD: Minh Anh" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Giới tính</label>
              <select id="gender" class="form-select">
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="name@email.com" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Mật khẩu</label>
              <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Thu nhập</label>
              <select id="income" class="form-select">
                <option value="">Chọn mức</option>
                <option>Dưới 10 triệu</option>
                <option>10 - 20 triệu</option>
                <option>20 - 50 triệu</option>
                <option>Trên 50 triệu</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Công việc</label>
              <input type="text" id="job" class="form-control" placeholder="VD: Kỹ sư, Kinh doanh...">
            </div>
          </div>
          
<div class="row g-3 mt-3">
  <div class="col-md-12">
    <label class="form-label">Giới thiệu bản thân</label>
    <textarea class="form-control" id="bio" placeholder="Giới thiệu ngắn"></textarea>
  </div>
  <div class="col-md-6">
    <label class="form-label">Số điện thoại</label>
    <input type="tel" class="form-control" id="phone" placeholder="0912xxxxx">
  </div>
  <div class="col-md-6">
    <label class="form-label">Khu vực sinh sống</label>
    <input type="text" class="form-control" id="region" placeholder="Khu vực">
  </div>
  <div class="col-md-6">
    <label class="form-label">Đối tượng muốn kết bạn</label>
    <select class="form-select" id="target">
      <option value="">--Chọn--</option>
      <option value="nam">Nam</option>
      <option value="nu">Nữ</option>
      <option value="khac">Khác</option>
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Quốc gia</label>
    <input type="text" class="form-control" id="country">
  </div>
  <div class="col-md-6">
    <label class="form-label">Thành phố/Khu vực</label>
    <input type="text" class="form-control" id="city">
  </div>
  <div class="col-md-6">
    <label class="form-label">Địa chỉ</label>
    <input type="text" class="form-control" id="address">
  </div>
  <div class="col-md-6">
    <label class="form-label">Tình trạng hôn nhân</label>
    <select class="form-select" id="marital">
      <option value="">--Chọn--</option>
      <option value="doc than">Độc thân</option>
      <option value="da ket hon">Đã kết hôn</option>
      <option value="ly hon">Ly hôn</option>
    </select>
  </div>
  <div class="col-md-6">
    <label class="form-label">Chiều cao (cm)</label>
    <input type="number" class="form-control" id="height">
  </div>
  <div class="col-md-6">
    <label class="form-label">Cân nặng (kg)</label>
    <input type="number" class="form-control" id="weight">
  </div>
</div>
<button class="btn btn-pink w-100 mt-3" id="btnRegister"><i class="fa-solid fa-user-plus"></i> Đăng ký</button>
          <div class="text-center mt-3">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const API_BASE = window.location.origin;
    document.getElementById('btnRegister').onclick = register;
    async function register(){
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const gender = document.getElementById('gender').value;
      const income = document.getElementById('income').value;
      const job = document.getElementById('job').value.trim();
      if(!username || !email || !password){ alert('Vui lòng nhập đủ thông tin'); return; }
      try {
        const res = await fetch(`${API_BASE}/api/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password, gender, income, job })
        });
        const data = await res.json();
        if(res.ok){
          alert('Đăng ký thành công! Vui lòng đăng nhập.');
          window.location.href = 'login.html';
        }else{
          alert(data.message || 'Đăng ký thất bại!');
        }
      } catch(e){ alert('Lỗi kết nối server!'); }
    }
  </script>

<script>
document.getElementById('btnRegister').addEventListener('click', async function(e){
  e.preventDefault();
  const payload = {
    username: document.getElementById('username').value.trim(),
    gender: document.getElementById('gender').value,
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    income: document.getElementById('income') ? document.getElementById('income').value : '',
    job: document.getElementById('job') ? document.getElementById('job').value : '',
    bio: document.getElementById('bio') ? document.getElementById('bio').value : '',
    phone: document.getElementById('phone') ? document.getElementById('phone').value : '',
    region: document.getElementById('region') ? document.getElementById('region').value : '',
    target: document.getElementById('target') ? document.getElementById('target').value : '',
    country: document.getElementById('country') ? document.getElementById('country').value : '',
    city: document.getElementById('city') ? document.getElementById('city').value : '',
    address: document.getElementById('address') ? document.getElementById('address').value : '',
    marital: document.getElementById('marital') ? document.getElementById('marital').value : '',
    height: document.getElementById('height') ? document.getElementById('height').value : '',
    weight: document.getElementById('weight') ? document.getElementById('weight').value : ''
  };
  try{
    const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const d = await res.json();
    if(!res.ok){ alert(d.message || 'Đăng ký thất bại'); return; }
    alert('Đăng ký thành công!');
    window.location.href = 'login.html';
  }catch(e){ console.error(e); alert('Lỗi mạng'); }
});
</script>

</body>
</html>
