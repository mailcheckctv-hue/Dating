<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f6f6f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
    h2 { margin-bottom: 20px; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
    button { width: 100%; padding: 10px; background: #ff4b5c; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #e04352; }
    .link { margin-top: 10px; text-align: center; font-size: 14px; }
    .link a { text-decoration: none; color: #007bff; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Đăng ký</h2>
    <form id="registerForm">
      <input type="text" id="username" placeholder="Tên người dùng" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Mật khẩu" required />
      <select id="gender">
        <option value="Nam">Nam</option>
        <option value="Nữ">Nữ</option>
      </select>
      <button type="submit">Đăng ký</button>
    </form>
    <div class="link">
      <a href="login.html">Đăng nhập</a>
    </div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const gender = document.getElementById("gender").value;

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password, gender })
        });
        const data = await res.json();
        alert(data.message || "Đăng ký thành công!");
        window.location.href = "login.html";
      } catch (err) {
        alert("Lỗi kết nối server!");
      }
    });
  </script>
</body>
</html>
